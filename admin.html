<!DOCTYPE html>
<html lang="hu">
<head>
    <meta charset="UTF-8">
    <title>Admin - Csak Tanárnak</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        body { font-family: sans-serif; background: #0f172a; color: white; display: flex; justify-content: center; padding-top: 50px; margin: 0; }
        .card { background: #1e293b; padding: 30px; border-radius: 12px; width: 350px; border: 1px solid #f43f5e; box-shadow: 0 10px 20px rgba(0,0,0,0.4); display: none; } /* Alapból rejtve */
        input { width: 100%; padding: 12px; margin: 10px 0; border-radius: 8px; border: 1px solid #334155; background: #0f172a; color: white; box-sizing: border-box; }
        button { width: 100%; padding: 12px; background: #f43f5e; color: white; border: none; border-radius: 8px; cursor: pointer; font-weight: bold; font-size: 16px; }
        #status { text-align: center; margin-top: 15px; }
        .forbidden { text-align: center; color: #f43f5e; padding: 50px; }
    </style>
</head>
<body>

    <div id="forbidden-msg" class="forbidden" style="display:none;">
        <h1>Hoppá! ⛔</h1>
        <p>Nincs jogosultságod ezen az oldalon tartózkodni.</p>
        <button onclick="window.location.href='index.html'" style="background:#38bdf8; width:auto;">Vissza a belépéshez</button>
    </div>

    <div class="card" id="admin-ui">
        <h2>Admin - Új Fizika Lecke</h2>
        <p id="welcome-text" style="font-size: 12px; color: #94a3b8;"></p>
        <input type="text" id="leiras" placeholder="Lecke címe (pl. Newton I.)">
        <input type="text" id="fajl" placeholder="Link a fájlhoz (Google Drive)">
        <button onclick="mentes()">Feltöltés az adatbázisba</button>
        <div id="status"></div>
    </div>

    <script>
        const sb = supabase.createClient("https://hiiakcswjoynxyppwczu.supabase.co", "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImhpaWFrY3N3am95bnh5cHB3Y3p1Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzgxNzA1MjUsImV4cCI6MjA5Mzc0NjUyNX0.8T1gsFjZigKsegxpWuMWUbT_nw4b12ZhHPCFUxY2vgg");

        // --- ADMIN ELLENŐRZÉS ---
        async function checkAdmin() {
            const { data: { user } } = await sb.auth.getUser();

            // IDE ÍRD BE A SAJÁT EMAIL CÍMEDET, AMIVEL REGISZTRÁLTÁL!
            const adminEmail = "te_email_cimed@gmail.com"; 

            if (!user || user.email !== adminEmail) {
                document.getElementById('forbidden-msg').style.display = 'block';
            } else {
                document.getElementById('admin-ui').style.display = 'block';
                document.getElementById('welcome-text').innerText = "Belépve mint: " + user.email;
            }
        }

        async function mentes() {
            const l = document.getElementById('leiras').value;
            const f = document.getElementById('fajl').value;
            const s = document.getElementById('status');

            if(!l || !f) return;

            const { error } = await sb.from('Fizika 9').insert([{ Leírás: l, Fájl: f }]);

            if(error) {
                s.innerText = "Hiba: " + error.message;
                s.style.color = "red";
            } else {
                s.innerText = "Sikeresen kikerült a főoldalra! ✅";
                s.style.color = "lightgreen";
                document.getElementById('leiras').value = "";
                document.getElementById('fajl').value = "";
            }
        }

        checkAdmin();
    </script>
</body>
</html>
