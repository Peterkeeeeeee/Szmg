<!DOCTYPE html>
<html lang="hu">
<head>
    <meta charset="UTF-8">
    <title>Admin Feltöltő</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        body { font-family: sans-serif; background: #0f172a; color: white; display: flex; justify-content: center; padding-top: 50px; }
        .card { background: #1e293b; padding: 30px; border-radius: 12px; width: 350px; border: 1px solid #38bdf8; }
        input { width: 100%; padding: 12px; margin: 10px 0; border-radius: 8px; border: 1px solid #334155; background: #0f172a; color: white; box-sizing: border-box; }
        button { width: 100%; padding: 12px; background: #38bdf8; border: none; border-radius: 8px; cursor: pointer; font-weight: bold; width: 100%; }
    </style>
</head>
<body>
    <div class="card">
        <h2>Új Fizika Lecke</h2>
        <input type="text" id="leiras" placeholder="Lecke címe / Leírás">
        <input type="text" id="fajl" placeholder="Link a fájlhoz (https://...)">
        <button onclick="mentes()">Feltöltés</button>
        <p id="status" style="text-align:center; margin-top:10px;"></p>
    </div>

    <script>
        const sb = supabase.createClient("https://hiiakcswjoynxyppwczu.supabase.co", "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImhpaWFrY3N3am95bnh5cHB3Y3p1Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzgxNzA1MjUsImV4cCI6MjA5Mzc0NjUyNX0.8T1gsFjZigKsegxpWuMWUbT_nw4b12ZhHPCFUxY2vgg");

        async function mentes() {
            const l = document.getElementById('leiras').value;
            const f = document.getElementById('fajl').value;
            const s = document.getElementById('status');

            if(!l || !f) { alert("Töltsd ki mindkettőt!"); return; }

            const { error } = await sb.from('Fizika 9').insert([{ Leírás: l, Fájl: f }]);

            if(error) {
                s.innerText = "Hiba: " + error.message;
                s.style.color = "red";
            } else {
                s.innerText = "Sikeres feltöltés! ✅";
                s.style.color = "lightgreen";
                document.getElementById('leiras').value = "";
                document.getElementById('fajl').value = "";
            }
        }
    </script>
</body>
</html>
