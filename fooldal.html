<!DOCTYPE html>
<html lang="hu">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SZMG Online - Főoldal</title>
    <link rel="stylesheet" href="stilus.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
</head>
<body>
    <header>
        <div class="logo">SZMG <span>ONLINE</span></div>
        <div class="nav-icons">
            <button onclick="logout()" style="width:auto; padding:8px 15px; background:var(--orange);">Kilépés</button>
        </div>
    </header>

    <main>
        <div id="folder-view" style="display:flex; flex-wrap:wrap; gap:20px; justify-content:center;">
            </div>

        <div id="file-view" style="display:none; width:100%; max-width:800px; padding:20px;">
            <button onclick="closeFolder()" class="btn" style="width:auto; margin-bottom:20px; background:var(--dark-blue);">Vissza</button>
            <div id="file-list" style="display:grid; gap:10px;"></div>
        </div>
    </main>

    <script>
        const SB_URL = "https://hiiakcswjoynxyppwczu.supabase.co";
        const SB_KEY = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImhpaWFrY3N3am95bnh5cHB3Y3p1Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzgxNzA1MjUsImV4cCI6MjA5Mzc0NjUyNX0.8T1gsFjZigKsegxpWuMWUbT_nw4b12ZhHPCFUxY2vgg";
        const sb = supabase.createClient(SB_URL, SB_KEY);

        async function checkUser() {
            const { data: { session } } = await sb.auth.getSession();
            if (!session) {
                window.location.replace("index.html");
            } else {
                loadFolders();
            }
        }
        checkUser();

        async function loadFolders() {
            const { data: mappak, error } = await sb.from('mappak').select('*');
            if (error) return console.error(error);

            const folderView = document.getElementById('folder-view');
            
            // Itt a javítás: Pontosan azokat a neveket használjuk, amik a tábládban vannak
            folderView.innerHTML = mappak.map(m => `
                <div class="floating-folder" onclick="openFolder('${m.tábla_neve}')">
                    <i class="fas fa-folder-open"></i>
                    <span style="font-weight:700;">${m.megjelenített_nev}</span>
                </div>
            `).join('');
        }

        async function openFolder(tableName) {
            document.getElementById('folder-view').style.display = 'none';
            document.getElementById('file-view').style.display = 'block';
            
            // A táblanevet idézőjelek közé tesszük a szóközök miatt
            const { data, error } = await sb.from(tableName).select('*');
            if (error) return console.error(error);

            const list = document.getElementById('file-list');
            list.innerHTML = data.map(f => `
                <div class="card" style="display:flex; justify-content:space-between; align-items:center; padding:15px; max-width:none; text-align:left;">
                    <span><i class="fas fa-file-pdf"></i> ${f.Leírás}</span>
                    <a href="${f.Fájl}" target="_blank" class="btn" style="width:auto; padding:5px 15px; text-decoration:none;">Megnyitás</a>
                </div>
            `).join('');
        }

        function closeFolder() {
            document.getElementById('file-view').style.display = 'none';
            document.getElementById('folder-view').style.display = 'flex';
        }

        async function logout() {
            await sb.auth.signOut();
            window.location.replace("index.html");
        }
    </script>
</body>
</html>
