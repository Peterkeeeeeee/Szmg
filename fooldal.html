<!DOCTYPE html>
<html lang="hu">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SZMG Online - Főoldal</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="stilus.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        :root { --bg-dark: #0a0f1d; --card-dark: #161c2d; }
        body { background-color: var(--bg-dark); color: #f1f5f9; display: flex; flex-direction: column; min-height: 100vh; margin: 0; font-family: 'Poppins', sans-serif; }
        
        header { width: 100%; padding: 15px 30px; display: flex; justify-content: space-between; align-items: center; background: rgba(22, 28, 45, 0.9); backdrop-filter: blur(10px); border-bottom: 1px solid #2d3748; box-sizing: border-box; position: fixed; top: 0; z-index: 1000; }
        .nav-right { display: flex; gap: 15px; align-items: center; }
        
        main { flex: 1; display: flex; justify-content: center; align-items: center; padding-top: 80px; width: 100%; }
        
        .profile-card, .folder-card { background: var(--card-dark); padding: 40px; border-radius: 24px; border: 1px solid #2d3748; box-shadow: 0 20px 40px rgba(0,0,0,0.4); text-align: center; transition: transform 0.3s; cursor: pointer; max-width: 400px; width: 90%; }
        .folder-card:hover { transform: translateY(-10px); border-color: var(--orange); }
        .folder-card i { font-size: 4rem; color: var(--orange); margin-bottom: 15px; }

        .btn-outline { background: transparent; border: 1px solid var(--orange); color: var(--orange); padding: 8px 16px; border-radius: 10px; cursor: pointer; font-weight: 600; }
        .btn-full { background: var(--orange); color: white; border: none; padding: 12px 24px; border-radius: 10px; cursor: pointer; font-weight: 700; width: 100%; margin-top: 10px; }
        input { width: 100%; padding: 12px; margin: 10px 0; border-radius: 8px; border: 1px solid #2d3748; background: #0a0f1d; color: white; box-sizing: border-box; }
    </style>
</head>
<body>
    <header>
        <div class="logo">SZMG <span>ONLINE</span></div>
        <div class="nav-right">
            <button class="btn-outline" onclick="showProfile()"><i class="fas fa-user-circle"></i> Profil</button>
            <button class="btn" style="background:var(--orange); width:auto;" onclick="logout()">Kilépés</button>
        </div>
    </header>

    <main>
        <div id="main-view" class="folder-card" onclick="openFolder()">
            <i class="fas fa-folder-open"></i>
            <h2>Fizika 9.</h2>
            <p style="color: #94a3b8;">Kattints a tananyagok megnyitásához</p>
        </div>

        <div id="profile-view" class="profile-card" style="display:none;">
            <h2>Profil Beállítások</h2>
            <p id="user-email-display" style="color: var(--orange); font-weight: 600;"></p>
            <hr style="border: 0; border-top: 1px solid #2d3748; margin: 20px 0;">
            <input type="password" id="new-password" placeholder="Új jelszó">
            <button class="btn-full" onclick="updatePassword()">Jelszó frissítése</button>
            <button class="btn-outline" style="width: 100%; margin-top: 10px;" onclick="hideProfile()">Vissza</button>
        </div>
    </main>

    <script>
        const SB_URL = "https://hiiakcswjoynxyppwczu.supabase.co";
        const SB_KEY = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImhpaWFrY3N3am95bnh5cHB3Y3p1Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzgxNzA1MjUsImV4cCI6MjA5Mzc0NjUyNX0.8T1gsFjZigKsegxpWuMWUbT_nw4b12ZhHPCFUxY2vgg";
        const sb = supabase.createClient(SB_URL, SB_KEY);

        async function checkUser() {
            const { data: { user } } = await sb.auth.getUser();
            if (!user) window.location.replace("index.html");
            else document.getElementById('user-email-display').innerText = user.email;
        }

        function showProfile() {
            document.getElementById('main-view').style.display = 'none';
            document.getElementById('profile-view').style.display = 'block';
        }

        function hideProfile() {
            document.getElementById('profile-view').style.display = 'none';
            document.getElementById('main-view').style.display = 'block';
        }

        async function updatePassword() {
            const newPw = document.getElementById('new-password').value;
            if (newPw.length < 6) return alert("A jelszónak legalább 6 karakternek kell lennie!");
            
            const { error } = await sb.auth.updateUser({ password: newPw });
            if (error) alert("Hiba: " + error.message);
            else { alert("Jelszó sikeresen módosítva!"); hideProfile(); }
        }

        function openFolder() { window.location.href = "fizika9.html"; } // Vagy a fájllistázós nézeted

        async function logout() { await sb.auth.signOut(); window.location.replace("index.html"); }
        
        checkUser();
    </script>
</body>
</html>
