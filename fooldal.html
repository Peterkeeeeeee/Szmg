<!DOCTYPE html>
<html lang="hu">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SZMG ONLINE</title>
    <link rel="icon" type="image/jpeg" href="szmglogo.jpg">
    
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    
    <link rel="stylesheet" href="stilus.css">
    
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
</head>
<body>

    <header>
        <div class="logo">SZMG <span>ONLINE</span></div>
        <div style="display: flex; gap: 15px;">
            <button class="btn-glass" onclick="showProfile()">
                <i class="fas fa-user-circle"></i> Profil
            </button>
            <button class="btn-orange" onclick="logout()">Kilépés</button>
        </div>
    </header>

    <main>
        <div id="folder-grid">
            </div>

        <div id="files-view" class="view-container" style="display:none;">
            <h2 id="folder-title" style="text-align: center; color: var(--orange); font-size: 2rem; margin-bottom: 30px;"></h2>
            <div id="file-list"></div>
            <div style="text-align: center; margin-top: 40px;">
                <button class="btn-glass" onclick="location.reload()">
                    <i class="fas fa-arrow-left"></i> Vissza a mappákhoz
                </button>
            </div>
        </div>

        <div id="profile-view" class="view-container" style="display:none; text-align: center;">
            <div class="folder-card" style="cursor: default; max-width: 400px; margin: 0 auto;">
                <i class="fas fa-user-shield"></i>
                <h2>Profilom</h2>
                <p id="user-display" style="font-weight:bold; color: var(--orange); margin-bottom: 20px;"></p>
                <input type="password" id="new-pw" placeholder="Új jelszó megadása">
                <button class="btn-orange" onclick="updatePw()" style="width: 100%; margin-top: 10px;">Mentés</button>
                <button class="btn-glass" onclick="location.reload()" style="width: 100%; margin-top: 10px;">Mégse</button>
            </div>
        </div>
    </main>

    <script>
        // Supabase konfiguráció (A te adataiddal)
        const SB_URL = "https://hiiakcswjoynxyppwczu.supabase.co";
        const SB_KEY = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImhpaWFrY3N3am95bnh5cHB3Y3p1Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzgxNzA1MjUsImV4cCI6MjA5Mzc0NjUyNX0.8T1gsFjZigKsegxpWuMWUbT_nw4b12ZhHPCFUxY2vgg";
        const sb = supabase.createClient(SB_URL, SB_KEY);

        // 1. MAPPÁK BETÖLTÉSE: Lekéri a 'mappak' táblát és kártyákat generál
        async function loadFolders() {
            const { data: mappak, error } = await sb.from('mappak').select('*');
            if (error) return console.error("Hiba a mappák betöltésekor:", error);

            const grid = document.getElementById('folder-grid');
            grid.innerHTML = mappak.map(m => `
                <div class="folder-card" onclick="openFolder('${m.tábla_neve}', '${m.megjelenített_név}')">
                    <i class="fas fa-folder-open"></i>
                    <h3>${m.megjelenített_név}</h3>
                </div>
            `).join('');
        }

        // 2. ADOTT MAPPA MEGNYITÁSA: Lekéri a fájlokat az adott osztály táblájából
        async function openFolder(tableName, displayName) {
            document.getElementById('folder-grid').style.display = 'none';
            document.getElementById('files-view').style.display = 'block';
            document.getElementById('folder-title').innerText = displayName;

            const { data: fajlok, error } = await sb.from(tableName).select('*');
            const list = document.getElementById('file-list');
            
            if (fajlok && fajlok.length > 0) {
                list.innerHTML = fajlok.map(f => `
                    <div class="file-item">
                        <div style="display:flex; align-items:center; gap:15px;">
                            <i class="fas fa-file-pdf" style="color: #ff4444; font-size: 1.4rem;"></i>
                            <span style="font-weight: 500;">${f.Leírás}</span>
                        </div>
                        <a href="${f.Fájl}" target="_blank" class="btn-glass" style="padding: 6px 15px; font-size: 13px;">Megnyitás</a>
                    </div>
                `).join('');
            } else {
                list.innerHTML = "<p style='text-align:center; opacity:0.6;'>Ebben a mappában még nincsenek anyagok.</p>";
            }
        }

        // 3. PROFIL MEGJELENÍTÉSE
        async function showProfile() {
            document.getElementById('folder-grid').style.display = 'none';
            document.getElementById('profile-view').style.display = 'block';
            const { data: { user } } = await sb.auth.getUser();
            if (user) document.getElementById('user-display').innerText = user.email;
        }

        // 4. JELSZÓ MÓDOSÍTÁS
        async function updatePw() {
            const pw = document.getElementById('new-pw').value;
            if (pw.length < 6) return alert("A jelszónak legalább 6 karakternek kell lennie!");
            
            const { error } = await sb.auth.updateUser({ password: pw });
            if (error) alert(error.message); 
            else { alert("Jelszó sikeresen módosítva!"); location.reload(); }
        }

        // 5. KILÉPÉS
        async function logout() { 
            await sb.auth.signOut(); 
            window.location.href = "index.html"; 
        }
        
        // Oldal indulásakor mappák listázása
        loadFolders();
    </script>
</body>
</html>
