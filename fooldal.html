<!DOCTYPE html>
<html lang="hu">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>SZMG Online</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        :root {
            --white: #ffffff;
            --orange: #ff9800;
            --dark-blue: #1e3a8a;
            --gray: #f4f4f4;
            --text: #333;
            --card-bg: #ffffff;
            --sidebar-bg: #ffffff;
        }

        /* Sötét mód színei */
        body.dark-mode {
            --white: #0f172a;
            --gray: #1e293b;
            --text: #f1f5f9;
            --card-bg: #1e293b;
            --sidebar-bg: #0f172a;
        }

        body {
            font-family: 'Segoe UI', sans-serif;
            background-color: var(--white);
            color: var(--text);
            margin: 0;
            display: flex;
            flex-direction: column;
            height: 100vh;
            transition: 0.3s ease;
        }

        /* Fejléc */
        header {
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 15px 20px;
            background: var(--white);
            border-bottom: 2px solid var(--gray);
            z-index: 100;
        }

        .header-left i { color: var(--dark-blue); font-size: 22px; cursor: pointer; }
        .logo { font-size: 22px; font-weight: 800; color: var(--dark-blue); letter-spacing: -1px; }
        .logo span { color: var(--orange); }

        .profile-btn {
            width: 38px;
            height: 38px;
            background-color: var(--dark-blue);
            color: white;
            border-radius: 10px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-weight: bold;
            cursor: pointer;
            position: relative;
        }

        /* Profil Menü (Dropdown) */
        .profile-menu {
            display: none;
            position: absolute;
            top: 50px;
            right: 0;
            background: var(--card-bg);
            border: 1px solid var(--gray);
            border-radius: 12px;
            box-shadow: 0 10px 25px rgba(0,0,0,0.2);
            width: 180px;
            overflow: hidden;
            z-index: 1000;
        }

        .profile-menu button {
            width: 100%;
            padding: 12px;
            border: none;
            background: none;
            color: var(--text);
            text-align: left;
            cursor: pointer;
            font-size: 14px;
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .profile-menu button:hover { background: var(--gray); }

        /* Oldalsáv (Sidebar) */
        #sidebar {
            position: fixed;
            left: -280px;
            top: 0;
            width: 280px;
            height: 100%;
            background: var(--sidebar-bg);
            box-shadow: 10px 0 30px rgba(0,0,0,0.1);
            transition: 0.4s;
            z-index: 200;
            padding-top: 60px;
        }

        #sidebar.active { left: 0; }

        .sidebar-item {
            padding: 15px 25px;
            display: flex;
            align-items: center;
            gap: 15px;
            text-decoration: none;
            color: var(--text);
            font-weight: 600;
            transition: 0.2s;
        }

        .sidebar-item:hover { background: var(--gray); color: var(--orange); }
        .sidebar-overlay {
            display: none;
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0,0,0,0.5);
            z-index: 150;
        }

        /* Központi rész */
        main { flex: 1; display: flex; align-items: center; justify-content: center; padding: 20px; }

        .floating-folder {
            background: var(--card-bg);
            width: 220px;
            height: 220px;
            border-radius: 24px;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            box-shadow: 0 20px 40px rgba(0,0,0,0.1);
            border: 1px solid var(--gray);
            cursor: pointer;
            transition: 0.4s;
        }

        .floating-folder:hover { transform: translateY(-10px); border-color: var(--orange); }
        .floating-folder i { font-size: 80px; color: var(--orange); margin-bottom: 15px; }

        /* Fájl lista nézet */
        #file-view { display: none; width: 100%; max-width: 600px; animation: fadeIn 0.4s; }
        .file-item {
            background: var(--gray);
            padding: 15px;
            border-radius: 12px;
            display: flex;
            align-items: center;
            justify-content: space-between;
            text-decoration: none;
            color: var(--text);
            margin-bottom: 10px;
        }

        @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
    </style>
</head>
<body id="body">

<div class="sidebar-overlay" id="overlay" onclick="toggleSidebar()"></div>

<div id="sidebar">
    <a href="#" class="sidebar-item" onclick="toggleSidebar()"><i class="fas fa-home"></i> Kezdőlap</a>
    <a href="admin.html" class="sidebar-item"><i class="fas fa-user-shield"></i> Admin felület</a>
    <a href="#" class="sidebar-item" onclick="alert('Email: info@szmg.hu\nTel: +36 1 234 5678')"><i class="fas fa-envelope"></i> Elérhetőségek</a>
    <a href="#" class="sidebar-item" onclick="logout()" style="color: #f43f5e; margin-top: 20px;"><i class="fas fa-sign-out-alt"></i> Kijelentkezés</a>
</div>

<header>
    <div class="header-left">
        <i class="fas fa-bars" onclick="toggleSidebar()"></i>
    </div>
    <div class="logo">SZMG <span>ONLINE</span></div>
    <div class="header-right">
        <div class="profile-btn" id="user-initial" onclick="toggleProfileMenu()">?
            <div class="profile-menu" id="p-menu">
                <button onclick="toggleDarkMode()"><i class="fas fa-moon"></i> Sötét mód</button>
                <button onclick="logout()"><i class="fas fa-sign-out-alt"></i> Kilépés</button>
            </div>
        </div>
    </div>
</header>

<main>
    <div id="folder-view">
        <div class="floating-folder" onclick="openFolder()">
            <i class="fas fa-folder-open"></i>
            <span>Fizika 9.</span>
        </div>
    </div>

    <div id="file-view">
        <button onclick="closeFolder()" style="background:none; border:none; color:var(--orange); cursor:pointer; margin-bottom:15px; font-weight:bold;">
            <i class="fas fa-arrow-left"></i> Vissza
        </button>
        <div id="file-container"></div>
    </div>
</main>

<script>
    const SB_URL = "https://hiiakcswjoynxyppwczu.supabase.co";
    const SB_KEY = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImhpaWFrY3N3am95bnh5cHB3Y3p1Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzgxNzA1MjUsImV4cCI6MjA5Mzc0NjUyNX0.8T1gsFjZigKsegxpWuMWUbT_nw4b12ZhHPCFUxY2vgg";
    const sb = supabase.createClient(SB_URL, SB_KEY);

    // Sötét mód kezelése
    function toggleDarkMode() {
        document.body.classList.toggle('dark-mode');
        const isDark = document.body.classList.contains('dark-mode');
        localStorage.setItem('darkTheme', isDark);
    }

    if (localStorage.getItem('darkTheme') === 'true') {
        document.body.classList.add('dark-mode');
    }

    // Menük vezérlése
    function toggleSidebar() {
        document.getElementById('sidebar').classList.toggle('active');
        const overlay = document.getElementById('overlay');
        overlay.style.display = overlay.style.display === 'block' ? 'none' : 'block';
    }

    function toggleProfileMenu() {
        const menu = document.getElementById('p-menu');
        menu.style.display = menu.style.display === 'block' ? 'none' : 'block';
    }

    async function init() {
        const { data: { user } } = await sb.auth.getUser();
        if (!user) { window.location.href = "index.html"; return; }
        document.getElementById('user-initial').childNodes[0].nodeValue = user.email[0].toUpperCase();
    }

    async function openFolder() {
        document.getElementById('folder-view').style.display = 'none';
        document.getElementById('file-view').style.display = 'block';
        const container = document.getElementById('file-container');
        container.innerHTML = "<p>Betöltés...</p>";
        const { data } = await sb.from('Fizika 9').select('*');
        container.innerHTML = "";
        data.forEach(file => {
            const a = document.createElement('a');
            a.className = 'file-item';
            a.href = file.Fájl; a.target = "_blank";
            a.innerHTML = `<span>${file.Leírás}</span><i class="fas fa-chevron-right"></i>`;
            container.appendChild(a);
        });
    }

    function closeFolder() {
        document.getElementById('file-view').style.display = 'none';
        document.getElementById('folder-view').style.display = 'block';
    }

    async function logout() {
        await sb.auth.signOut();
        window.location.href = "index.html";
    }

    init();
</script>
</body>
</html>
