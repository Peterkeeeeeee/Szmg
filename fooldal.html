<!DOCTYPE html>
<html lang="hu">
<head>
    <meta charset="UTF-8">
    <title>Fizika 9 Jegyzetek</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        body { font-family: sans-serif; background: #0f172a; color: white; padding: 20px; }
        .grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(200px, 1fr)); gap: 20px; }
        .card { background: #1e293b; padding: 20px; border-radius: 10px; border: 1px solid #334155; text-align: center; }
        .btn { display: inline-block; background: #38bdf8; color: #0f172a; padding: 10px; border-radius: 5px; text-decoration: none; font-weight: bold; margin-top: 10px; }
    </style>
</head>
<body>
    <h1>Fizika 9. osztályos anyagok</h1>
    <div id="lista" class="grid">Betöltés...</div>

    <script>
        const sb = supabase.createClient("https://hiiakcswjoynxyppwczu.supabase.co", "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImhpaWFrY3N3am95bnh5cHB3Y3p1Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzgxNzA1MjUsImV4cCI6MjA5Mzc0NjUyNX0.8T1gsFjZigKsegxpWuMWUbT_nw4b12ZhHPCFUxY2vgg");

        async function betoltes() {
            const { data, error } = await sb.from('Fizika 9').select('*');
            const lista = document.getElementById('lista');
            lista.innerHTML = "";

            if(data) {
                data.forEach(sor => {
                    const div = document.createElement('div');
                    div.className = 'card';
                    div.innerHTML = `<h3>${sor.Leírás}</h3><a href="${sor.Fájl}" target="_blank" class="btn">Megnyitás</a>`;
                    lista.appendChild(div);
                });
            }
        }
        betoltes();
    </script>
</body>
</html>
