<!DOCTYPE html>
<html lang="hu">
<head>
    <meta charset="UTF-8">
    <title>SZMG Online - Főoldal</title>
    <link rel="stylesheet" href="stilus.css">
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
</head>
<body>
    <div class="hatter-animacio"></div>
    <div class="glass-card" style="width: 450px;">
        <p class="brand-text">SZMG ONLINE</p>
        <div id="mappa-lista" class="mappa-lista">
            <p id="statusz">Adatok ellenőrzése...</p>
        </div>
    </div>

    <script>
        const _supabase = supabase.createClient('https://hiiakcswjoynxyppwczu.supabase.co', 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImhpaWFrY3N3am95bnh5cHB3Y3p1Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzgxNzA1MjUsImV4cCI6MjA5Mzc0NjUyNX0.8T1gsFjZigKsegxpWuMWUbT_nw4b12ZhHPCFUxY2vgg');

        async function betoltes() {
            // Lekérjük a mappákat
            const { data: mappak, error } = await _supabase.from('mappak').select('*');
            const listaDiv = document.getElementById('mappa-lista');

            if (error) {
                listaDiv.innerHTML = `<p style="color:red">Hiba: ${error.message}</p>`;
                return;
            }

            if (!mappak || mappak.length === 0) {
                listaDiv.innerHTML = `<p>A 'mappak' tábla üres a Supabase-ben! Adj hozzá sorokat.</p>`;
                return;
            }

            listaDiv.innerHTML = ''; 
            mappak.forEach(m => {
                const a = document.createElement('a');
                // Itt figyelünk a táblanévre
                a.href = `tananyag.html?tabla=${encodeURIComponent(m.tabla_neve)}`;
                a.className = 'mappa-elem';
                a.innerHTML = `<span class="mappa-ikon">📂</span> <span>${m.megjelenitett_nev}</span>`;
                listaDiv.appendChild(a);
            });
        }
        betoltes();
    </script>
</body>
</html>
