<!DOCTYPE html>
<html lang="hu">
<head>
    <meta charset="UTF-8">
    <title>SZMG Online - Főoldal</title>
    <link rel="stylesheet" href="stilus.css">
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
</head>
<body>
    <div class="hatter-animacio"></div>
    <div class="glass-card" style="width: 450px;">
        <p class="brand-text">SZMG ONLINE</p>
        <div id="mappa-lista" class="mappa-lista">
            </div>
    </div>

    <script>
        const supabase = supabase.createClient('https://hiiakcswjoynxyppwczu.supabase.co', 'IDE_AZ_ANON_KEYT');

        async function betoltes() {
            const { data: mappak, error } = await supabase.from('mappak').select('*');
            if (error) return;

            const lista = document.getElementById('mappa-lista');
            mappak.forEach(m => {
                const item = document.createElement('a');
                item.href = `tananyag.html?tabla=${m.tabla_neve}`;
                item.className = 'mappa-elem';
                item.innerHTML = `<span class="mappa-ikon">📂</span> <span>${m.megjelenitett_nev}</span>`;
                lista.appendChild(item);
            });
        }
        betoltes();
    </script>
</body>
</html>
