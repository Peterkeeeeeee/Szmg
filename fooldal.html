<!DOCTYPE html>
<html lang="hu">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SZMG Online</title>
    <link rel="stylesheet" href="stilus.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
</head>
<body>
    <header>
        <div class="logo">SZMG <span>ONLINE</span></div>
        <div class="nav-icons">
            <button onclick="logout()" style="width:auto; padding:5px 10px;">Kilépés</button>
        </div>
    </header>

    <main>
        <div id="folder-view">
            <div class="floating-folder" onclick="openFolder()">
                <i class="fas fa-folder-open"></i>
                <span>Fizika 9.</span>
            </div>
        </div>

        <div id="file-view" style="display:none; width:100%; max-width:600px;">
            <button onclick="closeFolder()" class="btn" style="margin-bottom:20px; background:var(--orange);">Vissza</button>
            <div id="file-list"></div>
        </div>
    </main>

    <script>
        const SB_URL = "https://hiiakcswjoynxyppwczu.supabase.co";
        const SB_KEY = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImhpaWFrY3N3am95bnh5cHB3Y3p1Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzgxNzA1MjUsImV4cCI6MjA5Mzc0NjUyNX0.8T1gsFjZigKsegxpWuMWUbT_nw4b12ZhHPCFUxY2vgg";
        const sb = supabase.createClient(SB_URL, SB_KEY);

        async function openFolder() {
            document.getElementById('folder-view').style.display = 'none';
            document.getElementById('file-view').style.display = 'block';
            const { data } = await sb.from('Fizika 9').select('*');
            const list = document.getElementById('file-list');
            list.innerHTML = data.map(f => `
                <a href="${f.Fájl}" target="_blank" class="card" style="display:flex; justify-content:space-between; margin-bottom:10px; padding:15px; text-decoration:none; color:var(--text);">
                    <span>${f.Leírás}</span><i class="fas fa-external-link-alt"></i>
                </a>
            `).join('');
        }

        function closeFolder() {
            document.getElementById('file-view').style.display = 'none';
            document.getElementById('folder-view').style.display = 'block';
        }

        async function logout() {
            await sb.auth.signOut();
            window.location.href = "index.html";
        }
    </script>
</body>
</html>
