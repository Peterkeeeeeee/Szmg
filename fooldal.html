<!DOCTYPE html>
<html lang="hu">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SZMG Online - Főoldal</title>
    <link rel="stylesheet" href="stilus.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        .folder-container {
            display: flex;
            flex-direction: column;
            gap: 15px;
            width: 100%;
            max-width: 400px;
            margin: 40px auto;
        }
        .folder-box {
            cursor: pointer;
            display: flex;
            align-items: center;
            padding: 20px;
            background: rgba(255, 255, 255, 0.1);
            border-radius: 12px;
            border: 1px solid rgba(255, 255, 255, 0.1);
            transition: 0.3s;
            color: white;
        }
        .folder-box:hover {
            background: rgba(255, 255, 255, 0.2);
            transform: scale(1.02);
        }
        .folder-box i {
            font-size: 1.5rem;
            color: #f1c40f;
            margin-right: 20px;
        }
        .folder-box span {
            font-weight: 700;
        }

        /* --- ÚJ: MODAL STÍLUSOK --- */
        #preview-modal {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.9);
            z-index: 1000;
            flex-direction: column;
        }
        .modal-header {
            padding: 15px;
            display: flex;
            justify-content: space-between;
            background: #2c3e50;
            color: white;
        }
        .modal-body {
            flex-grow: 1;
            width: 100%;
            border: none;
        }
        .close-btn {
            background: #e74c3c;
            color: white;
            border: none;
            padding: 5px 15px;
            border-radius: 5px;
            cursor: pointer;
            font-weight: bold;
        }
    </style>
</head>
<body>
    <header style="display: flex; justify-content: space-between; align-items: center; padding: 20px 40px;">
        <div class="logo" style="font-size: 1.8rem; font-weight: bold; color: white;">
            SZMG <span style="color: #e67e22;">ONLINE</span>
        </div>
        <button onclick="logout()" style="background: #e67e22; color: white; border: none; padding: 10px 20px; border-radius: 5px; cursor: pointer; font-weight: bold;">Kilépés</button>
    </header>

    <main>
        <div id="folder-view" class="folder-container">
            <p style="color: white; text-align: center;">Betöltés...</p>
        </div>

        <div id="file-view" style="display:none; width:100%; max-width:800px; padding:20px; margin: 0 auto;">
            <button onclick="closeFolder()" style="margin-bottom: 20px; background: #34495e; color: white; border: none; padding: 10px 20px; border-radius: 5px; cursor: pointer;">
                <i class="fas fa-arrow-left"></i> Vissza a mappákhoz
            </button>
            <div id="file-list" style="display: grid; gap: 10px;"></div>
        </div>
    </main>

    <!-- ÚJ: BEÁGYAZOTT NÉZET (MODAL) HTML -->
    <div id="preview-modal">
        <div class="modal-header">
            <span id="modal-title">Fájl megtekintése</span>
            <button class="close-btn" onclick="closePreview()">Bezárás</button>
        </div>
        <iframe id="preview-frame" class="modal-body" src=""></iframe>
    </div>

    <script>
        const SB_URL = "https://hiiakcswjoynxyppwczu.supabase.co";
        const SB_KEY = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImhpaWFrY3N3am95bnh5cHB3Y3p1Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzgxNzA1MjUsImV4cCI6MjA5Mzc0NjUyNX0.8T1gsFjZigKsegxpWuMWUbT_nw4b12ZhHPCFUxY2vgg";
        const sb = supabase.createClient(SB_URL, SB_KEY);

        async function loadFolders() {
            const { data: mappak, error } = await sb.from('mappak').select('*');
            if (error) return;

            const folderView = document.getElementById('folder-view');
            folderView.innerHTML = '';

            mappak.forEach(m => {
                const div = document.createElement('div');
                div.className = 'folder-box';
                div.onclick = () => openFolder(m.tabla_neve);
                div.innerHTML = `
                    <i class="fas fa-folder-open"></i>
                    <span>${m.megjelenitett_nev}</span>
                `;
                folderView.appendChild(div);
            });
        }

        async function openFolder(tableName) {
            document.getElementById('folder-view').style.display = 'none';
            document.getElementById('file-view').style.display = 'block';
            
            const { data, error } = await sb.from(tableName).select('*');
            if (error) return alert("Hiba a fájlok betöltésekor!");

            const list = document.getElementById('file-list');
            // MÓDOSÍTVA: Az <a> tag helyett gombot használunk, ami meghívja a preview-t
            list.innerHTML = data.map(f => `
                <div style="background: rgba(255,255,255,0.1); padding: 15px; border-radius: 10px; display: flex; justify-content: space-between; align-items: center; color: white;">
                    <span><i class="fas fa-file-pdf" style="color: #e74c3c; margin-right: 10px;"></i> ${f.Leírás}</span>
                    <button onclick="openPreview('${f.Fájl}', '${f.Leírás}')" style="background: #3498db; border:none; color: white; padding: 8px 15px; border-radius: 5px; font-weight: bold; cursor:pointer;">Megnyitás</button>
                </div>
            `).join('');
        }

        // ÚJ FUNKCIÓK A MEGNYITÁSHOZ ÉS BEZÁRÁSHOZ
        function openPreview(url, title) {
            const modal = document.getElementById('preview-modal');
            const iframe = document.getElementById('preview-frame');
            document.getElementById('modal-title').innerText = title;
            
            iframe.src = url;
            modal.style.display = 'flex';
            document.body.style.overflow = 'hidden'; // Ne görögjön a háttér
        }

        function closePreview() {
            const modal = document.getElementById('preview-modal');
            const iframe = document.getElementById('preview-frame');
            
            iframe.src = ""; // Leállítjuk a tartalom betöltését
            modal.style.display = 'none';
            document.body.style.overflow = 'auto';
        }

        function closeFolder() {
            document.getElementById('file-view').style.display = 'none';
            document.getElementById('folder-view').style.display = 'flex';
        }

        async function logout() {
            await sb.auth.signOut();
            window.location.replace("index.html");
        }

        loadFolders();
    </script>
</body>
</html>
