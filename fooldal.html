<!DOCTYPE html>
<html lang="hu">
<head>
    <meta charset="UTF-8">
    <title>SZMG ONLINE</title>
    <link rel="icon" href="szmglogo.jpg">
    <link rel="stylesheet" href="stilus.css">
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
</head>
<body>
    <header>
        <div class="logo">
            <img src="szmglogo.jpg" alt="Logo">
            SZMG <span>ONLINE</span>
        </div>
        <div style="display:flex; gap:10px;">
            <button class="btn-glass" onclick="location.href='admin.html'" style="width:auto;">Admin</button>
            <button class="btn-glass" onclick="showProfile()" style="width:auto;">Profil</button>
        </div>
    </header>

    <main id="content-area">
        <div id="folder-grid" style="display:grid; grid-template-columns:1fr 1fr; gap:15px; width:100%;">
            </div>

        <div id="profile-view" class="glass-card" style="display:none;">
            <h2>Beállítások</h2>
            <button class="btn-glass" onclick="toggleTheme()">Sötét / Világos mód váltása</button>
            <input type="password" id="new-pw" placeholder="Új jelszó">
            <button class="btn-orange" onclick="updatePw()">Jelszó mentése</button>
            <button class="btn-glass" onclick="location.reload()" style="margin-top:10px;">Vissza</button>
            <button class="btn-glass" onclick="logout()" style="color: #ff453a; border-color: rgba(255,69,58,0.3);">Kijelentkezés</button>
        </div>
    </main>

    <script>
        // Supabase Init...
        const sb = supabase.createClient("https://hiiakcswjoynxyppwczu.supabase.co", "KULCS");

        // Téma kezelés (LocalStorage-ban elmentjük)
        if(localStorage.getItem('theme') === 'light') document.body.classList.add('light-mode');

        function toggleTheme() {
            document.body.classList.toggle('light-mode');
            localStorage.setItem('theme', document.body.classList.contains('light-mode') ? 'light' : 'dark');
        }

        async function loadFolders() {
            const { data } = await sb.from('mappak').select('*');
            const grid = document.getElementById('folder-grid');
            grid.innerHTML = data.map(m => `
                <div class="glass-card" onclick="openFolder('${m.tábla_neve}')">
                    <h3 style="margin:0;">${m.megjelenített_név}</h3>
                </div>
            `).join('');
        }

        function showProfile() {
            document.getElementById('folder-grid').style.display = 'none';
            document.getElementById('profile-view').style.display = 'block';
        }

        async function logout() { await sb.auth.signOut(); window.location.href="index.html"; }
        
        loadFolders();
    </script>
</body>
</html>
