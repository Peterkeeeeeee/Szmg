<!DOCTYPE html>
<html lang="hu">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SZMG Online - Főoldal</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="stilus.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        :root { --bg-dark: #05070a; --card-dark: #0f172a; --border-color: #1e293b; }
        body { background-color: var(--bg-dark); color: #f1f5f9; min-height: 100vh; margin: 0; font-family: 'Poppins', sans-serif; display: flex; flex-direction: column; }
        
        header { width: 100%; padding: 15px 30px; display: flex; justify-content: space-between; align-items: center; background: rgba(15, 23, 42, 0.95); backdrop-filter: blur(10px); border-bottom: 1px solid var(--border-color); box-sizing: border-box; position: sticky; top: 0; z-index: 1000; }
        .nav-right { display: flex; gap: 15px; }
        
        main { flex: 1; display: flex; flex-direction: column; justify-content: center; align-items: center; padding: 20px; width: 100%; box-sizing: border-box; }
        
        .folder-card, .profile-card, .file-list-container { background: var(--card-dark); padding: 40px; border-radius: 24px; border: 1px solid var(--border-color); box-shadow: 0 25px 50px -12px rgba(0,0,0,0.5); text-align: center; max-width: 500px; width: 100%; box-sizing: border-box; }
        .folder-card:hover { border-color: var(--orange); transform: translateY(-5px); transition: all 0.3s; cursor: pointer; }
        .folder-card i { font-size: 4rem; color: var(--orange); margin-bottom: 15px; }

        .file-item { background: #1e293b; padding: 15px; border-radius: 12px; margin-bottom: 10px; display: flex; justify-content: space-between; align-items: center; text-align: left; }
        .btn-mini { background: var(--orange); color: white; text-decoration: none; padding: 5px 12px; border-radius: 6px; font-size: 0.8rem; font-weight: 700; }
        input { width: 100%; padding: 12px; margin: 10px 0; border-radius: 8px; border: 1px solid var(--border-color); background: #05070a; color: white; }
    </style>
</head>
<body>
    <header>
        <div class="logo">SZMG <span>ONLINE</span></div>
        <div class="nav-right">
            <button class="btn" style="width:auto; background:none; border:1px solid var(--orange); color:var(--orange);" onclick="showProfile()">Profil</button>
            <button class="btn" style="width:auto; background:var(--orange);" onclick="logout()">Kilépés</button>
        </div>
    </header>

    <main>
        <div id="main-view" class="folder-card" onclick="openFolderLocally()">
            <i class="fas fa-folder-open"></i>
            <h2>Fizika 9.</h2>
            <p style="color: #64748b;">Kattints a fájlok listázásához</p>
        </div>

        <div id="files-view" class="file-list-container" style="display:none; max-width: 700px;">
            <h2 style="margin-top:0;">Fizika 9. Anyagok</h2>
            <div id="file-list-content"></div>
            <button class="btn" style="margin-top:20px; background:var(--border-color);" onclick="hideFiles()">Vissza a mappákhoz</button>
        </div>

        <div id="profile-view" class="profile-card" style="display:none;">
            <h2>Profil Beállítások</h2>
            <p id="user-email" style="color: var(--orange); font-weight: 700;"></p>
            <input type="password" id="new-pw" placeholder="Új jelszó">
            <button class="btn" style="background:var(--orange);" onclick="updatePw()">Jelszó módosítása</button>
            <button class="btn" style="background:var(--border-color); margin-top:10px;" onclick="hideProfile()">Vissza</button>
        </div>
    </main>

    <script>
        const SB_URL = "https://hiiakcswjoynxyppwczu.supabase.co";
        const SB_KEY = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImhpaWFrY3N3am95bnh5cHB3Y3p1Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzgxNzA1MjUsImV4cCI6MjA5Mzc0NjUyNX0.8T1gsFjZigKsegxpWuMWUbT_nw4b12ZhHPCFUxY2vgg";
        const sb = supabase.createClient(SB_URL, SB_KEY);

        async function checkUser() {
            const { data: { user } } = await sb.auth.getUser();
            if (!user) window.location.replace("index.html");
            else document.getElementById('user-email').innerText = user.email;
        }

        // Fájlok betöltése ugyanazon az oldalon (Nincs 404!)
        async function openFolderLocally() {
            document.getElementById('main-view').style.display = 'none';
            document.getElementById('files-view').style.display = 'block';
            
            const { data } = await sb.from('Fizika 9').select('*');
            const content = document.getElementById('file-list-content');
            
            if (data && data.length > 0) {
                content.innerHTML = data.map(f => `
                    <div class="file-item">
                        <span><i class="fas fa-file-pdf" style="color:var(--orange); margin-right:10px;"></i> ${f.Leírás}</span>
                        <a href="${f.Fájl}" target="_blank" class="btn-mini">Megnyitás</a>
                    </div>
                `).join('');
            } else {
                content.innerHTML = "<p>Még nincs feltöltött anyag.</p>";
            }
        }

        function hideFiles() {
            document.getElementById('files-view').style.display = 'none';
            document.getElementById('main-view').style.display = 'block';
        }

        function showProfile() {
            document.getElementById('main-view').style.display = 'none';
            document.getElementById('files-view').style.display = 'none';
            document.getElementById('profile-view').style.display = 'block';
        }

        function hideProfile() {
            document.getElementById('profile-view').style.display = 'none';
            document.getElementById('main-view').style.display = 'block';
        }

        async function updatePw() {
            const pw = document.getElementById('new-pw').value;
            const { error } = await sb.auth.updateUser({ password: pw });
            if (error) alert(error.message); else alert("Sikeres módosítás!");
        }

        async function logout() { await sb.auth.signOut(); window.location.replace("index.html"); }
        
        checkUser();
    </script>
</body>
</html>
