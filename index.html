<!DOCTYPE html>
<html lang="hu">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Bejelentkezés és Regisztráció</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <link rel="stylesheet" href="stilus.css">
</head>
<body>

<div class="card">
    <h2 id="title">Bejelentkezés</h2>
    <input type="email" id="email" placeholder="Email cím">
    <input type="password" id="password" placeholder="Jelszó">
    <button onclick="handleAuth()" id="auth-btn">Belépés</button>
    <div id="status-msg"></div>
    <div class="toggle" onclick="toggleMode()">
        <span id="toggle-text">Nincs még fiókod? Regisztrálj!</span>
    </div>
</div>

<script>
    const SB_URL = "https://hiiakcswjoynxyppwczu.supabase.co";
    const SB_KEY = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImhpaWFrY3N3am95bnh5cHB3Y3p1Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzgxNzA1MjUsImV4cCI6MjA5Mzc0NjUyNX0.8T1gsFjZigKsegxpWuMWUbT_nw4b12ZhHPCFUxY2vgg"; 
    
    const sb = supabase.createClient(SB_URL, SB_KEY);
    let isLogin = true;

    function toggleMode() {
        isLogin = !isLogin;
        document.getElementById('status-msg').style.display = 'none';
        document.getElementById('title').innerText = isLogin ? "Bejelentkezés" : "Regisztráció";
        document.getElementById('auth-btn').innerText = isLogin ? "Belépés" : "Fiók létrehozása";
        document.getElementById('toggle-text').innerText = isLogin ? "Nincs még fiókod? Regisztrálj!" : "Már van fiókod? Lépj be!";
    }

    async function handleAuth() {
        const email = document.getElementById('email').value;
        const password = document.getElementById('password').value;
        const msgBox = document.getElementById('status-msg');

        if(!email || !password) return;

        msgBox.style.display = 'none';

        if (isLogin) {
            // BEJELENTKEZÉS
            const { data, error } = await sb.auth.signInWithPassword({ email, password });
            if (error) {
                msgBox.innerText = "Hiba: " + error.message;
                msgBox.className = "error";
                msgBox.style.display = 'block';
            } else {
                window.location.href = "fooldal.html";
            }
        } else {
            // REGISZTRÁCIÓ
            const { data, error } = await sb.auth.signUp({ email, password });
            if (error) {
                msgBox.innerText = "Hiba: " + error.message;
                msgBox.className = "error";
                msgBox.style.display = 'block';
            } else {
                msgBox.innerText = "Sikeres regisztráció! Kérlek igazold vissza az e-mail címed a kapott levélben, majd jelentkezz be!";
                msgBox.className = "info";
                msgBox.style.display = 'block';
            }
        }
    }
</script>
</body>
</html>
