<!DOCTYPE html>
<html lang="hu">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Bejelentkezés és Regisztráció</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        body { font-family: 'Segoe UI', sans-serif; background: #0f172a; color: white; display: flex; justify-content: center; align-items: center; height: 100vh; margin: 0; }
        .card { background: #1e293b; padding: 35px; border-radius: 15px; box-shadow: 0 10px 30px rgba(0,0,0,0.5); width: 100%; max-width: 350px; border: 1px solid #334155; }
        h2 { text-align: center; color: #38bdf8; margin-bottom: 25px; }
        input { width: 100%; padding: 12px; margin: 10px 0; border-radius: 8px; border: 1px solid #334155; background: #0f172a; color: white; box-sizing: border-box; outline: none; }
        input:focus { border-color: #38bdf8; }
        button { width: 100%; padding: 12px; background: #38bdf8; color: #0f172a; border: none; border-radius: 8px; cursor: pointer; font-weight: bold; font-size: 16px; transition: 0.3s; margin-top: 15px; }
        button:hover { background: #0ea5e9; transform: translateY(-2px); }
        .toggle { text-align: center; margin-top: 20px; font-size: 14px; color: #94a3b8; cursor: pointer; }
        .toggle span { color: #38bdf8; font-weight: bold; text-decoration: underline; }
        #status-msg { margin-top: 15px; padding: 10px; border-radius: 5px; font-size: 13px; text-align: center; display: none; }
        .info { background: rgba(56, 189, 248, 0.2); color: #38bdf8; }
        .error { background: rgba(239, 68, 68, 0.2); color: #ef4444; }
    </style>
</head>
<body>

<div class="card">
    <h2 id="title">Bejelentkezés</h2>
    <input type="email" id="email" placeholder="Email cím">
    <input type="password" id="password" placeholder="Jelszó">
    <button onclick="handleAuth()" id="auth-btn">Belépés</button>
    <div id="status-msg"></div>
    <div class="toggle" onclick="toggleMode()">
        <span id="toggle-text">Nincs még fiókod? Regisztrálj!</span>
    </div>
</div>

<script>
    const SB_URL = "https://hiiakcswjoynxyppwczu.supabase.co";
    const SB_KEY = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImhpaWFrY3N3am95bnh5cHB3Y3p1Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzgxNzA1MjUsImV4cCI6MjA5Mzc0NjUyNX0.8T1gsFjZigKsegxpWuMWUbT_nw4b12ZhHPCFUxY2vgg"; 
    
    const sb = supabase.createClient(SB_URL, SB_KEY);
    let isLogin = true;

    function toggleMode() {
        isLogin = !isLogin;
        document.getElementById('status-msg').style.display = 'none';
        document.getElementById('title').innerText = isLogin ? "Bejelentkezés" : "Regisztráció";
        document.getElementById('auth-btn').innerText = isLogin ? "Belépés" : "Fiók létrehozása";
        document.getElementById('toggle-text').innerText = isLogin ? "Nincs még fiókod? Regisztrálj!" : "Már van fiókod? Lépj be!";
    }

    async function handleAuth() {
        const email = document.getElementById('email').value;
        const password = document.getElementById('password').value;
        const msgBox = document.getElementById('status-msg');

        if(!email || !password) return;

        msgBox.style.display = 'none';

        if (isLogin) {
            // BEJELENTKEZÉS
            const { data, error } = await sb.auth.signInWithPassword({ email, password });
            if (error) {
                msgBox.innerText = "Hiba: " + error.message;
                msgBox.className = "error";
                msgBox.style.display = 'block';
            } else {
                window.location.href = "fooldal.html";
            }
        } else {
            // REGISZTRÁCIÓ
            const { data, error } = await sb.auth.signUp({ email, password });
            if (error) {
                msgBox.innerText = "Hiba: " + error.message;
                msgBox.className = "error";
                msgBox.style.display = 'block';
            } else {
                msgBox.innerText = "Sikeres regisztráció! Kérlek igazold vissza az e-mail címed a kapott levélben, majd jelentkezz be!";
                msgBox.className = "info";
                msgBox.style.display = 'block';
            }
        }
    }
</script>
</body>
</html>
