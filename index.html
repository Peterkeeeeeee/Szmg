<!DOCTYPE html>
<html lang="hu">
<head>
    <meta charset="UTF-8">
    <title>SZMG Online</title>
    <link rel="stylesheet" href="stilus.css">
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
</head>
<body>
    <div class="hatter-animacio"></div>
    <div class="glass-card">
        <p class="brand-text">SZMG ONLINE</p>
        <h1>Bejelentkezés</h1>
        
        <form id="login-form">
            <div class="input-csoport">
                <label>Email cím</label>
                <input type="email" id="email" placeholder="Kérem adja meg..." required>
            </div>
            <div class="input-csoport">
                <label>Jelszó</label>
                <input type="password" id="password" placeholder="Kérem adja meg..." required>
            </div>
            <button type="submit" class="btn-login">Belépés</button>
        </form>
        <p class="reg-link">Nincs még fiókod? Regisztrálj!</p>
    </div>

    <script>
        const supabase = supabase.createClient('https://hiiakcswjoynxyppwczu.supabase.co', 'IDE_AZ_ANON_KEYT');

        document.getElementById('login-form').addEventListener('submit', async (e) => {
            e.preventDefault();
            const { error } = await supabase.auth.signInWithPassword({
                email: document.getElementById('email').value,
                password: document.getElementById('password').value
            });
            if (error) alert("Hiba: " + error.message);
            else window.location.href = 'fooldal.html';
        });
    </script>
</body>
</html>
