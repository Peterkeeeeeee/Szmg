<!DOCTYPE html>
<html lang="hu">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SZMG Online - Bejelentkezés</title>
    <link rel="stylesheet" href="stilus.css">
</head>
<body>
    <div class="hatter-animacio"></div>
    
    <div class="login-card">
        <p class="brand-text">SZMG ONLINE</p>
        <h1>Bejelentkezés</h1>
        
        <form id="login-form">
            <div class="input-csoport">
                <label>Email cím</label>
                <input type="email" id="email" placeholder="Kérem adja meg..." required>
            </div>
            
            <div class="input-csoport">
                <label>Jelszó</label>
                <input type="password" id="password" placeholder="Kérem adja meg..." required>
            </div>
            
            <button type="submit" class="btn-login">Belépés</button>
        </form>
        
        <p class="reg-link">Nincs még fiókod? <a href="#">Regisztrálj!</a></p>
        
        <div class="ora-ikonok">
            <div class="ora-box">🕒</div>
            <div class="ora-box">🕒</div>
            <div class="ora-box">🕒</div>
        </div>
    </div>

    <script>
        // Belépés és átirányítás a főoldalra
        document.getElementById('login-form').addEventListener('submit', function(e) {
            e.preventDefault();
            window.location.href = 'fooldal.html';
        });
    </script>
</body>
</html>
