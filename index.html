<!DOCTYPE html>
<html lang="hu">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SZMG Online - Bejelentkezés</title>
    <link rel="stylesheet" href="stilus.css">
</head>
<body>
    <div class="hatter-animacio"></div>
    
    <div class="glass-container">
        <form id="login-form" class="login-card">
            <p class="brand-text">SZMG ONLINE</p>
            <h1>Bejelentkezés</h1>
            
            <div class="input-csoport">
                <label for="email">Email cím</label>
                <input type="email" id="email" placeholder="pelda@iskola.hu" required>
            </div>
            
            <div class="input-csoport">
                <label for="password">Jelszó</label>
                <input type="password" id="password" placeholder="••••••••" required>
            </div>
            
            <button type="submit" class="btn-login">Belépés</button>
            
            <p class="reg-link">Nincs még fiókod? <a href="#">Regisztrálj!</a></p>
            
            <div class="social-icons">
                <div class="icon"></div>
                <div class="icon"></div>
                <div class="icon"></div>
            </div>
        </form>
    </div>

    <script>
        // Belépés logika: Ha rákattint a gombra, átviszi a fooldal.html-re
        document.getElementById('login-form').addEventListener('submit', function(e) {
            e.preventDefault();
            // Itt később jöhet a Supabase hitelesítés, most csak átirányítunk
            window.location.href = 'fooldal.html';
        });
    </script>
</body>
</html>
