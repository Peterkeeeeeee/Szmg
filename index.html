<!DOCTYPE html>
<html lang="hu">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SZMG Online - Belépés</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="stilus.css">
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
</head>
<body>

    <div class="auth-container">
        <div class="card" id="auth-card">
            <div class="logo">SZMG <span>ONLINE</span></div>
            
            <div id="login-view">
                <h2>Bejelentkezés</h2>
                <input type="email" id="login-email" placeholder="Email cím">
                <input type="password" id="login-password" placeholder="Jelszó">
                <button onclick="handleLogin()">Belépés</button>
                <p onclick="showRegister()" style="cursor:pointer; color:var(--orange); font-weight:700; margin-top:20px;">
                    Nincs még fiókod? Regisztrálj!
                </p>
            </div>

            <div id="register-view" style="display: none;">
                <h2>Regisztráció</h2>
                <input type="email" id="reg-email" placeholder="Email cím">
                <input type="password" id="reg-password" placeholder="Jelszó">
                
                <label style="display:block; text-align:left; margin-bottom:5px; font-weight:700;">Válaszd ki az osztályod:</label>
                <select id="reg-class" style="width:100%; padding:12px; border-radius:10px; margin-bottom:20px; border:1px solid var(--border); background:var(--gray); color:var(--text);">
                    <option value="9.A">9.A</option>
                    <option value="9.B">9.B</option>
                    <option value="10.A">10.A</option>
                    <option value="10.B">10.B</option>
                </select>

                <button onclick="handleRegister()">Regisztráció indítása</button>
                <p onclick="showLogin()" style="cursor:pointer; color:var(--dark-blue); font-weight:700; margin-top:20px;">
                    Már van fiókod? Lépj be!
                </p>
            </div>
        </div>
    </div>

    <script>
        const sb = supabase.createClient("https://hiiakcswjoynxyppwczu.supabase.co", "YOUR_KEY_HERE");

        function showRegister() {
            document.getElementById('login-view').style.display = 'none';
            document.getElementById('register-view').style.display = 'block';
        }

        function showLogin() {
            document.getElementById('register-view').style.display = 'none';
            document.getElementById('login-view').style.display = 'block';
        }

        async function handleLogin() {
            const email = document.getElementById('login-email').value;
            const password = document.getElementById('login-password').value;
            const { error } = await sb.auth.signInWithPassword({ email, password });
            if (error) alert("Hiba: " + error.message);
            else window.location.href = "fooldal.html";
        }

        async function handleRegister() {
            const email = document.getElementById('reg-email').value;
            const password = document.getElementById('reg-password').value;
            const userClass = document.getElementById('reg-class').value;

            const { data, error } = await sb.auth.signUp({
                email,
                password,
                options: {
                    data: {
                        osztaly: userClass,
                        is_admin: false
                    }
                }
            });

            if (error) alert("Hiba: " + error.message);
            else window.location.href = "siker.html";
        }
    </script>
</body>
</html>
